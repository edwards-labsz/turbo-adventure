name: Execute Python Script via SOCKS5 Proxy

on:
  workflow_dispatch: # Allows manual execution from the GitHub Actions UI
  schedule:
    - cron: '25 * * * *' # Runs every hour at exactly minute 25 (UTC)

jobs:
  execute-script:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out your repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install normal requests and proxy dependencies
      # PySocks/socks packages are required by requests to process socks5h:// URLs
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          pip install requests[socks] httpx[socks]
          # Uncomment the line below if you have a requirements.txt file
          # pip install -r requirements.txt

      # Step 4: Run your script with the unauthenticated proxy injected globally
      - name: Run Python Script Through Proxy
        env:
          # Use GitHub Secrets to avoid exposing your proxy server's IP address
          PROXY_HOST: ${{ secrets.SOCKS5_HOST }}
          PROXY_PORT: ${{ secrets.SOCKS5_PORT }}
        run: |
          # Inject proxy settings dynamically without credentials.
          # 'socks5h://' forces DNS resolution to happen on the proxy server side.
          export ALL_PROXY="socks5h://$PROXY_HOST:$PROXY_PORT"
          export HTTP_PROXY="socks5h://$PROXY_HOST:$PROXY_PORT"
          export HTTPS_PROXY="socks5h://$PROXY_HOST:$PROXY_PORT"
          
          # Execute your Python code
          python find_temp_mail.py
